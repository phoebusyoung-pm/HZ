<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <style>
    body { margin: 0; font: 14px -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif; color: #172033; background: #f6f8fb; }
    .panel { padding: 18px; }
    h1 { margin: 0 0 8px; font-size: 17px; }
    p { margin: 0 0 14px; color: #667085; line-height: 1.6; }
    button { width: 100%; height: 40px; border: 0; border-radius: 10px; background: #1677ff; color: #fff; font-weight: 700; cursor: pointer; }
    button.secondary { margin-top: 10px; background: #fff; color: #1677ff; border: 1px solid #d8e7ff; }
    .note { margin-top: 12px; font-size: 12px; color: #98a2b3; }
  </style>
</head>
<body>
  <div class="panel">
    <h1>展务系统原型导入</h1>
    <p>生成可编辑 Figma Frame：PC 端 1440px，小程序端 375px。文本、按钮、表单、卡片和导航均为可编辑图层。</p>
    <button id="create">生成全部页面</button>
    <button id="close" class="secondary">关闭</button>
    <div class="note">不会导入整页截图；复杂效果会使用 Figma 原生形状近似还原。</div>
  </div>
  <script>
    document.getElementById("create").onclick = () => parent.postMessage({ pluginMessage: { type: "create" } }, "*");
    document.getElementById("close").onclick = () => parent.postMessage({ pluginMessage: { type: "close" } }, "*");
  </script>
</body>
</html>
